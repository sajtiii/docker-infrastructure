name: node-exporter


networks:
  monitoring:
    external: true


services:
  node-exporter:
    image: prom/node-exporter:latest
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/host/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
      - "--collector.textfile.directory=/var/lib/node_exporter/textfile_collector"
      - "--log.format=json"
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    deploy:
      replicas: 1
      resources:
        reservations:
          cpus: "0.01"
          memory: 32M
        limits:
          cpus: "1.0"
          memory: 128M
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --tries=1
        - --spider
        - http://localhost:9100/metrics
      interval: 30s
      start_period: 15s
      timeout: 10s
      retries: 3
    cap_drop:
      - ALL
    # Lets node-exporter stat root-only paths (docker volume dirs, restricted ZFS datasets) so
    # node_filesystem_device_error{device_error="permission denied"} stops firing. Read-only;
    # mounts are :ro so this can't be used to write anything.
    cap_add:
      - DAC_READ_SEARCH
    networks:
      monitoring: {}
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    environment:
      TZ: "${TZ:-UTC}"
    volumes:
      - "/etc/localtime:/etc/localtime:ro"
      - "/proc:/host/proc:ro"
      - "/sys:/host/sys:ro"
      - "/:/host/rootfs:ro,rslave"
      - "/var/lib/node_exporter/textfile_collector:/var/lib/node_exporter/textfile_collector:ro"
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      prometheus.io/scrape: "true"
      prometheus.io/port: "9100"
